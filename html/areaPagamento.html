<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Pagamento</title>
    <link rel="stylesheet" href="../css/areaPagamento.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
</head>

<body>


<nav>
    <div class="logoNav">
        <img src="../img/logo.png" alt="Logo">
        <span>ONDE EU PAREI?</span>
    </div>

    <div class="usuario">
        <a href="../index.html">Cadastro</a>
        <a href="../html/areaPagamento.html">Pagamento</a>
        <a href="../html/funcionario.html">Funcionário</a>
    </div>
</nav>

<div class="container">

   
    <div class="card">
        <h1>Informe os dados</h1>

        <form class="form">
            <input type="text" placeholder="PLACA DO VEÍCULO">
            <input type="text" placeholder="CPF">
            <input type="text" placeholder="TEMPO">
        </form>
    </div>

    
    <div class="card">
        <h1>PAGAMENTO</h1>

        <form class="form">
            <input type="text" placeholder="VALOR (R$)">

            <select>
                <option>FORMA DE PAGAMENTO</option>
                <option>PIX</option>
                <option>Cartão de Débito</option>
                <option>Cartão de Crédito</option>
                <option>Dinheiro</option>
            </select>
        </form>

        <div class="confimar">
            <button type="submit"><a href="../html/funcionario.html">CONFIRMAR</a></button>
        </div>
    </div>

</div>

</body>
</html>
