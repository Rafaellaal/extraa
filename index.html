<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamento</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="../img/logo.png">
</head>

<body>

<div class="container">

    <!-- ESQUERDA -->
    <div class="esquerda">
        <div class="juntos">
            <img class="letra" src="../img/letra.png" alt="letra">
            <img class="logo" src="../img/logo.png" alt="logo">
        </div>
    </div>

    <!-- DIREITA -->
    <div class="direita">

        <h2 class="titulo">CADASTRO</h2>

        <form class="grade">

            <div class="inputs">
                <input type="text" placeholder="USERNAME">
            </div>

            <div class="inputs">
                <input type="text" placeholder="CPF">
            </div>

            <div class="inputs">
                <input type="tel" placeholder="TELEFONE">
            </div>

            <div class="inputs">
                <input type="text" placeholder="PLACA">
            </div>

            <div class="inputs">
                <input type="email" placeholder="EMAIL">
            </div>

            <div class="inputs">
                <button class="btn" type="submit"><a href="./html/login.html">CADASTRAR-SE</a></button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
